openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Apex Health ecommerce API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product catalog
  - name: checkout
    description: Checkout and payments
  - name: orders
    description: Order management
  - name: customers
    description: Customer accounts
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List active products with prices
      parameters:
        - in: query
          name: category
          schema:
            type: string
          required: false
        - in: query
          name: limit
          schema:
            type: integer
          required: false
        - in: query
          name: offset
          schema:
            type: integer
          required: false
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"

  /products/featured:
    get:
      operationId: listFeaturedProducts
      tags: [products]
      summary: List featured products for homepage
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a single product with prices
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /checkout:
    post:
      operationId: createCheckout
      tags: [checkout]
      summary: Create a Stripe checkout session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "200":
          description: Checkout session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /shipping/rates:
    post:
      operationId: getShippingRates
      tags: [checkout]
      summary: Get available shipping rates for an address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShippingRatesRequest"
      responses:
        "200":
          description: Available shipping rates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShippingRatesResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID (for confirmation page)
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customers:
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Register a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Customer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customers/{email}/orders:
    get:
      operationId: getCustomerOrders
      tags: [customers]
      summary: Get orders for a customer by email
      parameters:
        - in: path
          name: email
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Customer orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"

  /me:
    get:
      operationId: getMe
      tags: [me]
      summary: Get the current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /my-orders:
    get:
      operationId: getMyOrders
      tags: [me]
      summary: Get orders for the current authenticated user
      responses:
        "200":
          description: Current user orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/products:
    get:
      operationId: adminListProducts
      tags: [admin]
      summary: List all products (including inactive)
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
          required: false
        - in: query
          name: offset
          schema:
            type: integer
          required: false
      responses:
        "200":
          description: All products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
    post:
      operationId: adminCreateProduct
      tags: [admin]
      summary: Create a product in Stripe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/products/{id}:
    patch:
      operationId: adminUpdateProduct
      tags: [admin]
      summary: Update a product
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: adminDeactivateProduct
      tags: [admin]
      summary: Deactivate a product
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Product deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/prices:
    get:
      operationId: adminListPrices
      tags: [admin]
      summary: List all prices
      parameters:
        - in: query
          name: productId
          schema:
            type: string
          required: false
      responses:
        "200":
          description: Prices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceListResponse"
    post:
      operationId: adminCreatePrice
      tags: [admin]
      summary: Create a price for a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PriceInput"
      responses:
        "201":
          description: Price created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Price"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/prices/{id}:
    delete:
      operationId: adminDeactivatePrice
      tags: [admin]
      summary: Deactivate a price
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Price deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Price"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders:
    get:
      operationId: adminListOrders
      tags: [admin]
      summary: List all orders
      parameters:
        - in: query
          name: status
          schema:
            type: string
          required: false
        - in: query
          name: limit
          schema:
            type: integer
          required: false
        - in: query
          name: offset
          schema:
            type: integer
          required: false
      responses:
        "200":
          description: All orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"

  /admin/orders/{id}:
    get:
      operationId: adminGetOrder
      tags: [admin]
      summary: Get order detail
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: adminUpdateOrder
      tags: [admin]
      summary: Update order status
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
          required: false
        - in: query
          name: offset
          schema:
            type: integer
          required: false
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /admin/users/{id}:
    get:
      operationId: adminGetUser
      tags: [admin]
      summary: Get user detail
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /discounts/validate:
    post:
      operationId: validateDiscount
      tags: [discounts]
      summary: Validate a discount code against the current cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscountValidateInput"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscountValidationResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/discounts:
    get:
      operationId: adminListDiscounts
      tags: [admin]
      summary: List discount codes
      responses:
        "200":
          description: Discount codes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscountListResponse"
    post:
      operationId: adminCreateDiscount
      tags: [admin]
      summary: Create a discount code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscountInput"
      responses:
        "201":
          description: Created discount
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discount"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/discounts/{id}:
    delete:
      operationId: adminDeactivateDiscount
      tags: [admin]
      summary: Deactivate a discount code
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Deactivated discount
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discount"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Price:
      type: object
      required: [id, unitAmount, currency, active, productId]
      properties:
        id:
          type: string
        unitAmount:
          type: integer
        currency:
          type: string
        active:
          type: boolean
        productId:
          type: string

    Product:
      type: object
      required: [id, name, active]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        active:
          type: boolean
        category:
          type: ["string", "null"]
        imageKey:
          type: ["string", "null"]
        featured:
          type: boolean
        prices:
          type: array
          items:
            $ref: "#/components/schemas/Price"

    ProductListResponse:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer

    ProductInput:
      type: object
      required: [name, unitAmount]
      properties:
        name:
          type: string
        description:
          type: string
        unitAmount:
          type: integer
        currency:
          type: string
        category:
          type: string
        imageKey:
          type: string
        featured:
          type: boolean

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        active:
          type: boolean
        category:
          type: string
        imageKey:
          type: string
        featured:
          type: boolean

    PriceInput:
      type: object
      required: [productId, unitAmount]
      properties:
        productId:
          type: string
        unitAmount:
          type: integer
        currency:
          type: string

    PriceListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Price"

    CheckoutInput:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        customerEmail:
          type: string
        successUrl:
          type: string
        cancelUrl:
          type: string
        promotionCode:
          type: ["string", "null"]
          description: Stripe promotion code id to apply to the session

    CartItem:
      type: object
      required: [priceId, quantity]
      properties:
        priceId:
          type: string
        quantity:
          type: integer

    CheckoutResponse:
      type: object
      required: [url, sessionId]
      properties:
        url:
          type: string
        sessionId:
          type: string

    Discount:
      type: object
      required:
        [
          id,
          code,
          active,
          discountType,
          limitModel,
          timesRedeemed,
        ]
      properties:
        id:
          type: string
          description: Stripe promotion code id
        code:
          type: string
        active:
          type: boolean
        discountType:
          type: string
          enum: [percentage, fixed]
        percentOff:
          type: ["number", "null"]
        amountOff:
          type: ["integer", "null"]
          description: Fixed discount in the smallest currency unit (cents)
        currency:
          type: ["string", "null"]
        limitModel:
          type: string
          enum: [per_customer, first_time, global]
        maxRedemptions:
          type: ["integer", "null"]
        timesRedeemed:
          type: integer
        minimumAmount:
          type: ["integer", "null"]
          description: Minimum order subtotal in cents required to use the code
        expiresAt:
          type: ["string", "null"]
          description: ISO timestamp when the code expires
        createdAt:
          type: ["string", "null"]

    DiscountInput:
      type: object
      required: [code, discountType, limitModel]
      properties:
        code:
          type: string
          minLength: 1
        discountType:
          type: string
          enum: [percentage, fixed]
        percentOff:
          type: ["number", "null"]
          description: Required when discountType is percentage (1-100)
        amountOff:
          type: ["integer", "null"]
          description: Required when discountType is fixed (cents)
        currency:
          type: ["string", "null"]
        limitModel:
          type: string
          enum: [per_customer, first_time, global]
        maxRedemptions:
          type: ["integer", "null"]
        minimumAmount:
          type: ["integer", "null"]
        expiresAt:
          type: ["string", "null"]

    DiscountListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Discount"

    DiscountValidateInput:
      type: object
      required: [code, subtotal]
      properties:
        code:
          type: string
          minLength: 1
        subtotal:
          type: integer
          description: Current cart subtotal in cents
        email:
          type: ["string", "null"]

    DiscountValidationResult:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean
        code:
          type: ["string", "null"]
        promotionCodeId:
          type: ["string", "null"]
        discountType:
          type: ["string", "null"]
          enum: [percentage, fixed, null]
        amountOff:
          type: ["integer", "null"]
          description: Computed discount in cents for the supplied subtotal
        description:
          type: ["string", "null"]
        reason:
          type: ["string", "null"]
          description: Human-readable reason when not valid

    OrderItem:
      type: object
      required: [id, productId, productName, unitAmount, quantity, currency]
      properties:
        id:
          type: integer
        productId:
          type: string
        productName:
          type: string
        priceId:
          type: ["string", "null"]
        unitAmount:
          type: integer
        quantity:
          type: integer
        currency:
          type: string

    Order:
      type: object
      required: [id, customerEmail, status, totalAmount, currency, createdAt]
      properties:
        id:
          type: integer
        stripeSessionId:
          type: ["string", "null"]
        stripePaymentIntentId:
          type: ["string", "null"]
        customerEmail:
          type: string
        customerName:
          type: ["string", "null"]
        status:
          type: string
        totalAmount:
          type: integer
        currency:
          type: string
        createdAt:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"

    OrderUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string

    OrderListResponse:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer

    Me:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: ["string", "null"]
        role:
          type: string
          enum: [customer, admin]

    CustomerInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
        name:
          type: string

    Customer:
      type: object
      required: [id, email, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: ["string", "null"]
        stripeCustomerId:
          type: ["string", "null"]
        createdAt:
          type: string

    User:
      type: object
      required: [id, email, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: ["string", "null"]
        stripeCustomerId:
          type: ["string", "null"]
        totalOrders:
          type: integer
        totalSpent:
          type: integer
        createdAt:
          type: string

    UserListResponse:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer

    ShippingAddress:
      type: object
      required: [name, address1, city, state, zip, country]
      properties:
        name:
          type: string
        address1:
          type: string
        address2:
          type: string
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        country:
          type: string

    ShippingRatesRequest:
      type: object
      required: [address, itemCount]
      properties:
        address:
          $ref: "#/components/schemas/ShippingAddress"
        itemCount:
          type: integer
        totalWeightOz:
          type: number

    ShippingRate:
      type: object
      required: [serviceCode, serviceName, carrierCode, carrierName, amountCents, estimatedDays]
      properties:
        serviceCode:
          type: string
        serviceName:
          type: string
        carrierCode:
          type: string
        carrierName:
          type: string
        amountCents:
          type: integer
        estimatedDays:
          type: integer

    ShippingRatesResponse:
      type: object
      required: [rates, isLive]
      properties:
        rates:
          type: array
          items:
            $ref: "#/components/schemas/ShippingRate"
        isLive:
          type: boolean

    AdminStats:
      type: object
      required: [totalOrders, totalRevenue, totalCustomers, recentOrders]
      properties:
        totalOrders:
          type: integer
        totalRevenue:
          type: integer
        totalCustomers:
          type: integer
        newOrdersThisWeek:
          type: integer
        revenueThisWeek:
          type: integer
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
